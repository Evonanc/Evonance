<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EVONANCE — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: Inter, -apple-system, sans-serif; }
    body {
      background: #0a0b1a;
      color: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }
    .logo {
      width: 64px;
      height: 64px;
      background: #0066ff;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 700;
      color: white;
      margin: 0 auto 2rem;
    }
    .icon {
      font-size: 48px;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    p {
      color: #94a3b8;
      font-size: 1rem;
      line-height: 1.6;
      max-width: 360px;
      margin-bottom: 2rem;
    }
    .card {
      background: #111827;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 1.5rem;
      max-width: 360px;
      width: 100%;
      margin-bottom: 2rem;
    }
    .card-title {
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #e2e8f0;
    }
    .feature {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.625rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-size: 0.875rem;
      color: #94a3b8;
    }
    .feature:last-child { border-bottom: none; }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #0066ff;
      flex-shrink: 0;
    }
    button {
      background: #0066ff;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 0.875rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      font-family: inherit;
    }
    button:hover { opacity: 0.9; }
    .retry-icon { display: inline-block; margin-right: 0.5rem; }
  </style>
</head>
<body>
  <div class="logo">E</div>
  <div class="icon">📡</div>
  <h1>You're offline</h1>
  <p>
    No internet connection detected. Check your connection
    and try again. Your portfolio data will sync when
    you're back online.
  </p>

  <div class="card">
    <p class="card-title">Available offline:</p>
    <div class="feature">
      <div class="dot"></div>
      View cached portfolio data
    </div>
    <div class="feature">
      <div class="dot"></div>
      Browse previously loaded pages
    </div>
    <div class="feature">
      <div class="dot"></div>
      Read your transaction history
    </div>
    <div class="feature">
      <div class="dot"></div>
      Access help center articles
    </div>
  </div>

  <button onclick="handleRetry()">
    <span class="retry-icon">↻</span>
    Try again
  </button>

  <script>
    function handleRetry() {
      if (navigator.onLine) {
        window.location.href = '/';
      } else {
        window.location.reload();
      }
    }

    // Auto-redirect when back online
    window.addEventListener('online', () => {
      window.location.href = '/';
    });
  </script>
</body>
</html>
